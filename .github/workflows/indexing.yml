name: Google Indexing API (Fixed)

on:
  push:
    branches:
      - indexing # [수정] main 대신 indexing 브랜치로 변경
  workflow_dispatch: # 수동 실행 버튼은 유지하는 게 편리합니다.

jobs:
  indexing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          npm init -y
          npm install googleapis

      - name: Create Service Account Key File
        run: |
          # 작은따옴표로 감싸서 JSON 데이터 깨짐 방지
          echo '${{ secrets.INDEXING_SERVICE_ACCOUNT }}' > service_account.json
          chmod 600 service_account.json

      - name: Generate URL List
        run: |
          DOMAIN="https://hyungjinhan.github.io"
          if curl --output /dev/null --silent --head --fail "$DOMAIN/sitemap-v2.xml"; then
            # 정규식 보강: URL 끝에 불필요한 태그가 붙지 않도록 처리
            curl -s "$DOMAIN/sitemap-v2.xml" | grep -oP 'https://hyungjinhan\.github\.io/[^\s<]*' | sed 's/<\/loc>//g' | sort -u | head -n 200 > urls.txt
            echo "✅ 총 $(wc -l < urls.txt) 개의 URL을 발견했습니다."
            if [ ! -s urls.txt ]; then
              echo "❌ URL을 찾을 수 없습니다."
              exit 1
            fi
          else
            echo "❌ sitemap-v2.xml을 찾을 수 없습니다."
            exit 1
          fi

      - name: Index URLs
        run: |
          # 인덱싱 스크립트 (딥시크가 작성한 검증된 코드)
          cat > index.js << 'EOF'
          const { google } = require('googleapis');
          const fs = require('fs');
          const readline = require('readline');

          async function indexURL(url) {
            try {
              const auth = new google.auth.GoogleAuth({
                keyFile: './service_account.json',
                scopes: ['https://www.googleapis.com/auth/indexing'],
              });
              
              const client = await auth.getClient();
              const indexing = google.indexing({
                version: 'v3',
                auth: client,
              });
              
              const response = await indexing.urlNotifications.publish({
                requestBody: {
                  url: url.trim(),
                  type: 'URL_UPDATED',
                },
              });
              
              console.log(`✅ 성공: ${url}`);
              return true;
            } catch (error) {
              console.error(`❌ 실패: ${url}`);
              console.error(`에러 메시지: ${error.message}`);
              return false;
            }
          }

          async function main() {
            if (!fs.existsSync('./urls.txt')) {
              console.error('urls.txt 파일이 없습니다.');
              process.exit(1);
            }

            const fileStream = fs.createReadStream('./urls.txt');
            const rl = readline.createInterface({
              input: fileStream,
              crlfDelay: Infinity,
            });

            let successCount = 0;
            let failCount = 0;

            for await (const line of rl) {
              const url = line.trim();
              if (url) {
                console.log(`\n📤 처리 중: ${url}`);
                const success = await indexURL(url);
                if (success) {
                  successCount++;
                } else {
                  failCount++;
                }
                // API 할당량 및 안정성을 위해 1초 대기
                await new Promise(resolve => setTimeout(resolve, 1000));
              }
            }

            console.log(`\n📊 최종 결과: 성공 ${successCount}, 실패 ${failCount}`);
          }

          main().catch(console.error);
          EOF

          node index.js
